<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy YOU!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    display:flex; justify-content:center; align-items:center;
    height:100vh; font-family:'Press Start 2P',monospace; overflow:hidden;
    background:#000;
  }
  #gameContainer { position:relative; width:400px; height:600px; }
  canvas { display:block; border-radius:4px; }

  /* ===== INTRO SCREEN ===== */
  #introScreen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:#fff; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start;
    border-radius:4px; z-index:20; overflow:hidden;
  }
  #introScreen .intro-photo {
    width:100%; height:auto; max-height:70%; object-fit:contain;
    border-bottom:4px solid #ff69b4;
  }
  #introScreen .intro-body {
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:14px 20px; background:#fff;
  }
  #introScreen h1 {
    font-size:17px; color:#ff1493; text-align:center; line-height:1.6;
    text-shadow: 2px 2px 0 #ffaadd; margin-bottom:8px; display:none;
  }
  #introScreen .tagline {
    font-size:8px; color:#555; text-align:center; line-height:2;
    margin-bottom:18px;
  }
  #playBtn {
    background: linear-gradient(135deg,#ff69b4,#ff1493);
    color:#fff; border:none; padding:13px 30px;
    font-family:'Press Start 2P',monospace; font-size:11px;
    cursor:pointer; border-radius:30px;
    box-shadow:0 4px 20px #ff69b488; transition:all 0.2s;
    border:3px solid #fff;
  }
  #playBtn:hover { transform:scale(1.07); box-shadow:0 6px 28px #ff1493aa; }

  /* ===== GAME CANVAS OVERLAY ===== */
  #overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:none; flex-direction:column; justify-content:center; align-items:center;
    background:rgba(0,0,0,0.80); color:#fff; text-align:center;
    padding:20px; border-radius:4px; z-index:5;
  }

  /* ===== VICTORY SCREEN ===== */
  #victoryScreen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:none; flex-direction:column; align-items:center;
    background:#fff; border-radius:4px; z-index:15; overflow:hidden;
  }
  #victoryScreen .vic-photo {
    width:100%; height:auto; max-height:55%; object-fit:contain;
  }
  #victoryScreen .vic-body {
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:12px 20px; background:#fff;
    width:100%;
  }
  #victoryScreen h1 {
    font-size:20px; color:#ff1493; text-align:center; line-height:1.6;
    animation:pulse 0.8s ease-in-out infinite;
    text-shadow:2px 2px 0 #ffaadd; margin-bottom:6px;
  }
  #victoryScreen .vic-sub {
    font-size:8px; color:#333; text-align:center; line-height:2.2;
    margin-bottom:6px;
  }
  #victoryScreen .vic-score {
    font-size:16px; color:#ff1493; margin:8px 0;
    text-shadow:0 0 8px #ff69b4;
  }
  .emoji-big { font-size:28px; margin:6px 0; animation:bounce 0.5s ease-in-out infinite alternate; }
  #playAgainBtn {
    background:linear-gradient(135deg,#ff69b4,#ff1493);
    color:#fff; border:none; padding:12px 26px;
    font-family:'Press Start 2P',monospace; font-size:10px;
    cursor:pointer; border-radius:30px;
    box-shadow:0 4px 20px #ff69b488; transition:all 0.2s;
    border:3px solid #fff; margin-top:10px;
  }
  #playAgainBtn:hover { transform:scale(1.06); }

  @keyframes pulse {
    0%,100% { transform:scale(1); text-shadow:2px 2px 0 #ffaadd; }
    50% { transform:scale(1.05); text-shadow:0 0 20px #ff1493,2px 2px 0 #ffaadd; }
  }
  @keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-8px); } }
  @keyframes confettiFall {
    0% { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(640px) rotate(720deg); opacity:0; }
  }
  .confetti-piece {
    position:absolute; animation:confettiFall linear forwards;
    border-radius:2px; pointer-events:none;
  }
</style>
</head>

// ========== INIT ==========
function initGame() {
  bird = { x:80, y:CH/2-28, vel:0, gravity:0.44, jump:-8.2 };
  pipes = [];
  frameCount = 0;
  score = 0;
}

// ========== INPUT ==========
function handleInput() {
  if (state === 'dead') { restartGame(); return; }
  if (state === 'playing') { bird.vel = bird.jump; }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleInput(); }
});
canvas.addEventListener('click', handleInput);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(); }, {passive:false});

playBtn.addEventListener('click', e => {
  e.stopPropagation();
  introEl.style.display = 'none';
  victoryEl.style.display = 'none';
  initGame();
  state = 'playing';
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
});

playAgainBtn.addEventListener('click', e => {
  e.stopPropagation();
  victoryEl.style.display = 'none';
  initGame();
  state = 'playing';
});

function restartGame() {
  initGame();
  state = 'playing';
}

// ========== HELPERS ==========
function shadeColor(hex, amt) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.max(0,r+amt)); g=Math.min(255,Math.max(0,g+amt)); b=Math.min(255,Math.max(0,b+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function spawnPipe() {
  const gap=150, minTop=80, maxTop=CH-GROUND_H-gap-80;
  const topH=Math.random()*(maxTop-minTop)+minTop;
  pipes.push({ x:CW+10, topH, botY:topH+gap, w:62, passed:false });
}

function checkCollision() {
  const m=8, bx=bird.x+m, by=bird.y+m, size=46-m*2;
  if (bird.y+46 >= CH-GROUND_H) return true;
  if (bird.y <= 0) return true;
  for (const p of pipes) {
    if (bx+size > p.x-4 && bx < p.x+p.w+4) {
      if (by < p.topH || by+size > p.botY) return true;
    }
  }
  return false;
}

function showVictory() {
  state = 'victory';
  document.getElementById('vicScore').textContent = 'SCORE: ' + score;
  victoryEl.style.display = 'flex';
  spawnConfetti(victoryEl);
}

function spawnConfetti(parent) {
  const cols=['#FFD700','#ff69b4','#ff6b6b','#a855f7','#3b82f6','#22c55e','#f97316'];
  for (let i=0; i<55; i++) {
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'%';
    el.style.top='-20px';
    el.style.background=cols[Math.floor(Math.random()*cols.length)];
    el.style.animationDuration=(Math.random()*2+1.5)+'s';
    el.style.animationDelay=(Math.random()*2.5)+'s';
    el.style.width=(Math.random()*8+6)+'px';
    el.style.height=(Math.random()*8+6)+'px';
    parent.appendChild(el);
    setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },5500);
  }
}

// ========== DRAW SKY ==========
function drawSky() {
  const g=ctx.createLinearGradient(0,0,0,CH-GROUND_H);
  g.addColorStop(0,'#1a6ebd'); g.addColorStop(1,'#a8dcf5');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH-GROUND_H);
  // Sun
  ctx.save();
  ctx.beginPath(); ctx.arc(340,55,30,0,Math.PI*2);
  const sg=ctx.createRadialGradient(340,55,5,340,55,30);
  sg.addColorStop(0,'#fffbe0'); sg.addColorStop(1,'#ffd700');
  ctx.fillStyle=sg; ctx.fill();
  ctx.restore();
}

function drawClouds() {
  ctx.fillStyle='rgba(255,255,255,0.88)';
  [[60,70,90,34],[210,48,110,40],[340,100,75,28],[110,160,65,24]].forEach(([cx,cy,cw,ch]) => {
    const rx=((cx-cloudOffset*0.35)%(CW+130)+CW+130)%(CW+130)-65;
    ctx.beginPath(); ctx.ellipse(rx,cy,cw/2,ch/2,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(rx+25,cy-10,cw/3,ch/2.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(rx-18,cy-5,cw/3.5,ch/2.8,0,0,Math.PI*2); ctx.fill();
  });
}

function drawGround() {
  // Dirt layer
  const dg=ctx.createLinearGradient(0,CH-GROUND_H,0,CH);
  dg.addColorStop(0,'#b8860b'); dg.addColorStop(1,'#8B6914');
  ctx.fillStyle=dg; ctx.fillRect(0,CH-GROUND_H,CW,GROUND_H);
  // Grass
  const gg=ctx.createLinearGradient(0,CH-GROUND_H,0,CH-GROUND_H+22);
  gg.addColorStop(0,'#5dbb63'); gg.addColorStop(1,'#3a9e40');
  ctx.fillStyle=gg; ctx.fillRect(0,CH-GROUND_H,CW,22);
  // Grass blades
  ctx.fillStyle='#3a9e40';
  for(let i=0; i<CW; i+=12) {
    const bx = ((i - groundOffset*0.5%12)+12)%12 + i - 6;
    if(bx>-5 && bx<CW+5) {
      ctx.beginPath();
      ctx.moveTo(bx, CH-GROUND_H);
      ctx.lineTo(bx+4, CH-GROUND_H-10);
      ctx.lineTo(bx+8, CH-GROUND_H);
      ctx.fill();
    }
  }
  // Ground stripes
  ctx.fillStyle='rgba(0,0,0,0.06)';
  for(let i=0; i<CW+50; i+=44) {
    const sx=((i-groundOffset%44)+44)%44+i-22;
    if(sx%(CW+44)-22 > -30 && sx%(CW+44)-22 < CW+10)
      ctx.fillRect(sx%(CW+44)-22, CH-GROUND_H+22, 22, GROUND_H-22);
  }
}

// ========== DRAW PIPE (REALISTIC) ==========
function drawPipe(p) {
  const x=p.x, w=p.w;
  const capH=26, capW=w+14;
  const capX=x-(capW-w)/2;

  function drawOnePipe(py, ph, isTop) {
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(x+w, py, 8, ph);

    // Main body gradient
    const bg=ctx.createLinearGradient(x,0,x+w,0);
    bg.addColorStop(0,'#1a7a1a');
    bg.addColorStop(0.15,'#2ecc2e');
    bg.addColorStop(0.45,'#3de03d');
    bg.addColorStop(0.7,'#2ecc2e');
    bg.addColorStop(1,'#0f5c0f');
    ctx.fillStyle=bg; ctx.fillRect(x,py,w,ph);

    // Highlight stripe
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.fillRect(x+6,py,8,ph);

    // Cap shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.fillRect(capX+capW, isTop?py+ph-capH:py, 10, capH);

    // Cap gradient
    const cg=ctx.createLinearGradient(capX,0,capX+capW,0);
    cg.addColorStop(0,'#136613');
    cg.addColorStop(0.2,'#29b829');
    cg.addColorStop(0.45,'#3de03d');
    cg.addColorStop(0.75,'#29b829');
    cg.addColorStop(1,'#0a420a');
    ctx.fillStyle=cg;
    ctx.fillRect(capX, isTop?py+ph-capH:py, capW, capH);

    // Cap highlight
    ctx.fillStyle='rgba(255,255,255,0.20)';
    ctx.fillRect(capX+5, isTop?py+ph-capH:py, 10, capH);

    // Cap border top/bottom line
    ctx.strokeStyle='#0a420a'; ctx.lineWidth=2;
    if(isTop) {
      ctx.beginPath(); ctx.moveTo(capX,py+ph-capH); ctx.lineTo(capX+capW,py+ph-capH); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(capX,py+capH); ctx.lineTo(capX+capW,py+capH); ctx.stroke();
    }

    // Rivet dots
    ctx.fillStyle='#0a420a';
    const ry = isTop ? py+ph-capH+8 : py+8;
    [capX+12, capX+capW-18].forEach(rx => {
      ctx.beginPath(); ctx.arc(rx,ry,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(rx-1,ry-1,1.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#0a420a';
    });
  }

  // Top pipe
  drawOnePipe(0, p.topH, true);
  // Bottom pipe
  drawOnePipe(p.botY, CH-GROUND_H-p.botY, false);
}

// ========== DRAW BIRD (TRIANGLE + FACE) ==========
function drawBird() {
  const bx = bird.x, by = bird.y;
  const size = 46;
  const cx = bx + size/2, cy = by + size/2;
  const r = size / 2 + 2;

  ctx.save();
  ctx.translate(cx, cy);

  // Clip to circle
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.clip();

  // Draw photo filling the circle
  if (BIRD_IMG.complete && BIRD_IMG.naturalWidth > 0) {
    ctx.drawImage(BIRD_IMG, -r, -r, r*2, r*2);
  } else {
    ctx.fillStyle = '#ffcc00';
    ctx.fill();
  }

  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle='rgba(0,0,0,0.40)'; ctx.fillRect(8,8,200,48);
  ctx.fillStyle='#fff'; ctx.font="bold 13px 'Press Start 2P',monospace";
  ctx.fillText('SCORE: '+score, 16, 28);
  ctx.font="9px 'Press Start 2P',monospace"; ctx.fillStyle='#ffd700';
  ctx.fillText('BEST: '+hiScore, 16, 47);
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(45,CH/2-100,310,165);
  // Red banner
  ctx.fillStyle='#ff3333'; ctx.fillRect(45,CH/2-100,310,44);
  ctx.fillStyle='#fff'; ctx.font="18px 'Press Start 2P',monospace";
  ctx.textAlign='center'; ctx.fillText('GAME OVER',CW/2,CH/2-68);
  ctx.fillStyle='#ffe082'; ctx.font="13px 'Press Start 2P',monospace";
  ctx.fillText('Score: '+score, CW/2, CH/2-30);
  ctx.font="9px 'Press Start 2P',monospace"; ctx.fillStyle='#aaffee';
  ctx.fillText('TAP to restart!', CW/2, CH/2+10);
  ctx.textAlign='left';
}

// ========== MAIN LOOP ==========
function loop() {
  ctx.clearRect(0,0,CW,CH);
  drawSky();
  drawClouds();

  if (state === 'playing') {
    bird.vel += bird.gravity;
    bird.y += bird.vel;
    frameCount++;
    cloudOffset += 0.5;
    groundOffset += 2;

    if (frameCount % 85 === 0) spawnPipe();

    const speed = Math.min(2.5 + score*0.1, 5.5);
    for (let i=pipes.length-1; i>=0; i--) {
      pipes[i].x -= speed;
      if (!pipes[i].passed && pipes[i].x+pipes[i].w < bird.x) {
        pipes[i].passed = true;
        score++;
        hiScore = Math.max(hiScore, score);
        if (score >= WIN_SCORE) {
          state = 'victory';
          setTimeout(showVictory, 400);
        }
      }
      if (pipes[i].x+pipes[i].w < -20) pipes.splice(i,1);
    }

    if (state === 'playing' && checkCollision()) {
      state = 'dead';
      if (score > hiScore) hiScore = score;
    }
  }

  pipes.forEach(drawPipe);
  drawGround();
  drawBird();
  drawHUD();
  if (state === 'dead') drawGameOver();

  animId = requestAnimationFrame(loop);
}
</script>
